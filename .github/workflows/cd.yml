name: CD

on:
  push:
    branches:
      - main

jobs:
  build-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build applications
        run: bun run build
  build-api:
    runs-on: ubuntu-latest
    needs:
      - build-code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: API docker Build
        uses: ./.github/actions/build-and-push
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: api
          context: ./apps/api
  build-landing:
    runs-on: ubuntu-latest
    needs:
      - build-code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Landing docker Build
        uses: ./.github/actions/build-and-push
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: api
          context: ./apps/landing
  build-admin:
    runs-on: ubuntu-latest
    needs:
      - build-code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Admin docker Build
        uses: ./.github/actions/build-and-push
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          image: api
          context: ./apps/admin
